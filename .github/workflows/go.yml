# This workflow will build, test, lint, and scan a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install dependencies
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    # TODO: Enable linting after resolving golangci-lint issues
    # - name: Lint
    #   run: golangci-lint run ./...

    - name: Security Scan
      run: govulncheck ./...

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Build Binaries
      run: |
        GOOS=linux GOARCH=amd64 go build -o launchpad-linux-amd64 ./cmd/launchpad
        GOOS=darwin GOARCH=amd64 go build -o launchpad-darwin-amd64 ./cmd/launchpad
        GOOS=windows GOARCH=amd64 go build -o launchpad-windows-amd64.exe ./cmd/launchpad